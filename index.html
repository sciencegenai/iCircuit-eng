<body>
    <!-- Top Logo Area -->
    <div class="top-logos">
        <div class="logo-item">
            <img src="https://www.eduhk.hk/ci/images/footer/ci_logo.png" alt="Department of Curriculum and Instruction">
        </div>
        <div class="logo-divider"></div>
        <div class="logo-item">
            <img src="https://www.eduhk.hk/ci/images/header/hkied_logo.png" alt="The Education University of Hong Kong">
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>🔌 Circuit Diagram Analysis System</h1>
            <p>Upload your circuit diagram for professional AI-powered feedback</p>
        </div>

        <div class="content">
            <form id="uploadForm">
                <div class="upload-section">
                    <label>Circuit Image</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="circuitImage" accept="image/*" required="">
                        <div class="file-input-text">📁 Click or drag to upload image</div>
                        <div class="file-input-hint">Supports JPG, PNG, GIF formats</div>
                    </div>
                    <img id="previewImage" class="preview-image" alt="Preview">
                </div>

                <div class="upload-section">
                    <label for="description">Circuit Description</label>
                    <textarea id="description" class="description-input" placeholder="Please describe the purpose, functionality of your circuit design, or areas requiring special attention..." required=""></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    🚀 Submit for Analysis
                </button>
            </form>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>AI is analyzing your circuit diagram, please wait...</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <div class="result-section" id="resultSection">
                <h3>💡 AI Analysis Results</h3>
                <div class="result-content" id="resultContent"></div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const imageInput = document.getElementById('circuitImage');
        const previewImage = document.getElementById('previewImage');
        const loading = document.getElementById('loading');
        const resultSection = document.getElementById('resultSection');
        const resultContent = document.getElementById('resultContent');
        const errorMessage = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');

        // Image preview
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImage.src = e.target.result;
                    previewImage.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Convert image to base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // Form submission
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const imageFile = imageInput.files[0];
            const description = document.getElementById('description').value;

            if (!imageFile || !description) {
                showError('Please ensure you have uploaded an image and filled in the description');
                return;
            }

            // Hide previous results and errors
            errorMessage.style.display = 'none';
            resultSection.style.display = 'none';
            
            // Show loading animation
            loading.style.display = 'block';
            submitBtn.disabled = true;

            try {
                // Convert image to base64
                const base64Image = await fileToBase64(imageFile);

                // Call Netlify Function
                const response = await fetch('/.netlify/functions/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        image: base64Image,
                        description: description
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `Request failed: ${response.status}`);
                }

                const data = await response.json();
                const aiResponse = data.result;

                // Display results
                resultContent.textContent = aiResponse;
                resultSection.style.display = 'block';

            } catch (error) {
                console.error('Error:', error);
                showError('Analysis failed: ' + error.message);
            } finally {
                loading.style.display = 'none';
                submitBtn.disabled = false;
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }
    </script>
